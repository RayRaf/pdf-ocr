# Override для локальной разработки.
# docker-compose up  автоматически мёржит это поверх docker-compose.yml.

services:
  web:
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - media_data:/app/media
      - db_data:/app/db_data
    # Для локалки не нужны Traefik labels
    labels: []
    networks:
      - app_network

  worker:
    command: ["celery", "-A", "pdf_ocr_project", "worker", "-l", "info", "-c", "2"]
    env_file:
      - .env
    volumes:
      - .:/app
      - media_data:/app/media
      - db_data:/app/db_data
    networks:
      - app_network
